function getSign(dob){
  if(!dob)return null;
  const d=new Date(dob+"T12:00:00"),mo=d.getMonth()+1,dy=d.getDate();
  if((mo===3&&dy>=21)||(mo===4&&dy<=19))return ZODIAC[0];
  if((mo===4&&dy>=20)||(mo===5&&dy<=20))return ZODIAC[1];
  if((mo===5&&dy>=21)||(mo===6&&dy<=20))return ZODIAC[2];
  if((mo===6&&dy>=21)||(mo===7&&dy<=22))return ZODIAC[3];
  if((mo===7&&dy>=23)||(mo===8&&dy<=22))return ZODIAC[4];
  if((mo===8&&dy>=23)||(mo===9&&dy<=22))return ZODIAC[5];
  if((mo===9&&dy>=23)||(mo===10&&dy<=22))return ZODIAC[6];
  if((mo===10&&dy>=23)||(mo===11&&dy<=21))return ZODIAC[7];
  if((mo===11&&dy>=22)||(mo===12&&dy<=21))return ZODIAC[8];
  if((mo===12&&dy>=22)||(mo===1&&dy<=19))return ZODIAC[9];
  if((mo===1&&dy>=20)||(mo===2&&dy<=18))return ZODIAC[10];
  return ZODIAC[11];
}
function getMoonPhase(){
  const phases=["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];
  const d=new Date();
  const dayY=Math.floor((d-(new Date(d.getFullYear(),0,0)))/86400000);
  return phases[Math.floor((dayY%30)/3.75)%8];
}

    home: isHigh?[

        `Camino hacia la ventana. La ciudad está cuarenta pisos más abajo — el tráfico, el ruido, la prisa — y nada de eso me alcanza aquí arriba. Sostengo mi café y lo miro todo como una persona mira algo que ha superado. Con ternura y sin ganas de volver.`),

function genStory(a,lang,slot=0){
  const b=buildBanks(a,lang);
  const p=(arr,off)=>arr[(slot+off)%arr.length];
  return [p(b.wake,0),p(b.home,1),p(b.morn,2),p(b.work,3),p(b.love,4),p(b.evening,2),p(b.closing,3)].join("\n\n");
}

function genTitle(a,lang,slot=0){

  const hasPassive=has(a.career||v,"passive","invest","income","portfolio","pasivo","invert");
  const hasCreate=has(a.career||v,"creat","design","art","write","photo","studio","music");

  if(slot===0){
    if(hasHigh)   return lang==="es"?"La Vista Desde la Vida Que Construí":"The View From the Life She Built";

    return lang==="es"?"Llegando a Casa en Su Vida Soñada":"Coming Home to Her Dream Life";
  }
  if(slot===1){

    if(isSelf2(a.love||"")) return lang==="es"?"La Mujer Que Se Eligió a Sí Misma":"The Woman Who Chose Herself";
    return lang==="es"?"Rodeada del Amor Que Siempre Mereció":"Surrounded by the Love She Always Deserved";
  }
  if(slot===2){
    if(hasBrand)  return lang==="es"?"El Día en Que los Números Le Dieron la Razón":"The Day the Numbers Proved Her Right";

    return lang==="es"?"La Carrera Que Siempre Se Mereció":"The Career She Always Deserved";
  }
  return p[slot%p.length];
}

const PRS={en:{morning:`Father, as I open my eyes to this day, I align my heart with the life You've already prepared for me. I release every doubt, every voice that tells me this is too much to ask. It isn't. You said ask. I'm asking. I receive this day with open hands. Thank you. Amen.`,evening:`Lord, as this day closes, I release it into Your hands. Whatever moved, moved. Whatever didn't — will. Your timing is not mine to rush. Thank you for the evidence already visible: the alignment, the doors that opened, the love that showed up in small ways. I rest tonight knowing my manifestation is not a wish. It's a promise already in motion. Amen.`,belief:`God, I confess that today belief is difficult. The doubt is louder than the vision. I ask You to bridge that gap — not because I have perfect faith, but because You said a mustard seed is enough. Take my small yes and multiply it. Let me feel, in one moment today, that this is real. Amen.`,abundance:`Father, I open my hands and heart to receive abundantly — not to hoard, but to serve and live fully. Abundance is not selfish. A woman thriving can pour into others. Align my finances, opportunities, and relationships with Your highest plan. I trust that asking for more is not asking for too much. It is Your original design. Amen.`,love:`Lord, I pray for the love that is already on its way to me. Let it find me whole, not desperate. Guard my heart from settling. Prepare me to receive what is real, deep, chosen, and safe — and let me love that person, and myself, with everything I have. Amen.`},es:{morning:`Padre, al abrir mis ojos a este día, alinéo mi corazón con la vida que ya preparaste para mí. Suelto cada duda, cada voz que me dice que esto es pedir demasiado. No lo es. Dijiste pide. Estoy pidiendo. Recibo este día con las manos abiertas. Gracias. Amén.`,evening:`Señor, al cerrar este día, lo suelto en Tus manos. Lo que se movió, se movió. Lo que no — se moverá. Tu tiempo no es mío para apresurar. Gracias por la evidencia ya visible: la alineación, las puertas que se abrieron, el amor que apareció en pequeñas formas. Descanso esta noche sabiendo que mi manifestación no es un deseo. Es una promesa ya en movimiento. Amén.`,belief:`Dios, confieso que hoy la creencia es difícil. La duda es más fuerte que la visión. Te pido que cierres esa brecha — no porque tenga fe perfecta, sino porque dijiste que con una semilla de mostaza es suficiente. Toma mi pequeño sí y multiplícalo. Déjame sentir, en un momento hoy, que esto es real. Amén.`,abundance:`Padre, abro mis manos y corazón para recibir abundantemente — no para acumular, sino para servir y vivir plenamente. La abundancia no es egoísta. Una mujer que prospera puede dar a otros. Alinea mis finanzas, oportunidades y relaciones con Tu plan más alto. Confío en que pedir más no es pedir demasiado. Es Tu diseño original. Amén.`,love:`Señor, oro por el amor que ya viene hacia mí. Que me encuentre entera, no desesperada. Guarda mi corazón de conformarse. Prepárame para recibir lo que es real, profundo, elegido y seguro — y déjame amar a esa persona, y a mí misma, con todo lo que tengo. Amén.`}};

es:[{title:"Alineación Matutina",dur:"5 min",t:"close_eyes",script:"Cierra los ojos. Respira cuatro tiempos, sostén cuatro, suelta cuatro. Estás empezando de nuevo. Siente el nuevo día llegando no como una demanda sino como una invitación. Pon una mano en tu pecho y nota tu latido — estable, presente, vivo. Ya eres suficiente para todo lo que este día pedirá. Respira hacia esa verdad. Deja que se asiente debajo de las palabras."},

  const back=()=>setIdx(i=>Math.max(0,i-1));
  const pct=Math.round((idx/OB_PH.length)*100);

  useEffect(()=>{ stateRef.current={lang,name,pronouns,dob,vision,belief,blocks:[...blocks],practiceTime}; });
  /* Auto-save partial progress to localStorage so nothing is lost */
  useEffect(()=>{
    if(name||vision) {
      const partial = {lang,name,pronouns,dob,vision,belief,blocks:[...blocks],practiceTime};
      try { localStorage.setItem(`celeste_partial_${lang}`, JSON.stringify(partial)); } catch {}

  },[lang,name,vision,pronouns,dob,belief,practiceTime]);
  useEffect(()=>{
    if(["name","vision","dob"].includes(phase)) setTimeout(()=>iRef.current&&iRef.current.focus(),350);
  },[phase]);
  useEffect(()=>{
    if(idx>=OB_PH.length){
      const s=stateRef.current;
      onComplete({lang:s.lang,name:s.name,pronouns:s.pronouns,dob:s.dob,vision:s.vision,belief:s.belief,blocks:s.blocks,practiceTime:s.practiceTime});

  },[idx,onComplete]);

  const T=(en,es)=>lang==="es"?es:en;
  const sign=getSign(dob);
  const dark=phase==="yourWords";

  const BELIEF_EN=["I'm stuck. I don't believe it yet.","I want to, but the doubt wins most days.","Some days I'm in. Some I'm not.","I'm close. I just need the reps.","I already am. I need it to compound."];

  const BLOCKS_EN=["I don't actually believe I can have it","I forget and guilt-spiral, then forget again","My past keeps arguing with my plan","I numb out before I can do the work","I need proof it's working before I commit","I'm afraid of what changes when I get it"];
  const BLOCKS_ES=["En realidad no creo que pueda tenerlo","Lo olvido y me culpo, luego lo vuelvo a olvidar","Mi pasado sigue discutiendo con mi plan","Me entumezco antes de poder hacer el trabajo","Necesito pruebas de que funciona antes de comprometerme","Tengo miedo de lo que cambia cuando lo obtengo"];
  const TIMES=["6:00 AM","7:00 AM","7:30 AM","8:00 AM","9:00 AM","12:00 PM","5:30 PM","9:00 PM"];

  /* LANG PICK */
  if(phase==="langPick") return (
    <div style={{minHeight:"100vh",background:P.cardGrad,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0 32px"}}>
      <style>{G}</style>
      <div className="ob" style={{textAlign:"center",marginBottom:52}}>
        <div style={{width:64,height:64,borderRadius:"50%",background:`linear-gradient(135deg,${P.butter},${P.pink})`,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:`0 6px 24px rgba(245,220,130,0.38)`}}>✦</div>

        <div style={{width:44,height:2,background:`linear-gradient(90deg,${P.butter},${P.pink})`,margin:"0 auto 14px",borderRadius:2}}/>

      </div>
      <div style={{width:"100%",maxWidth:300,display:"flex",flexDirection:"column",gap:12}}>
        <button onClick={()=>{setLang("en");next();}} style={{background:P.white,border:`1.5px solid ${P.border}`,borderRadius:18,padding:"18px 24px",fontSize:18,color:P.ink,fontFamily:PF,fontStyle:"italic",textAlign:"center",boxShadow:"0 2px 16px rgba(245,220,130,0.15)"}}><span style={{color:P.butterD}}>EN</span> · English →</button>
        <button onClick={()=>{setLang("es");next();}} style={{background:P.white,border:`1.5px solid ${P.borderP}`,borderRadius:18,padding:"18px 24px",fontSize:18,color:P.ink,fontFamily:PF,fontStyle:"italic",textAlign:"center",boxShadow:"0 2px 16px rgba(240,184,192,0.15)"}}><span style={{color:P.pinkD}}>ES</span> · Español →</button>
      </div>

        <PinkCard><p style={{fontFamily:SF,fontSize:14,color:P.ink,lineHeight:1.65,margin:0}}>{T("Everything you share stays with you. Celeste doesn't judge the size of the dream or how far you feel from it right now.","Todo lo que compartes se queda contigo. Celeste no juzga el tamaño del sueño ni cuán lejos te sientes de él ahora.")}</p></PinkCard>

      <div style={{padding:"16px 32px 52px"}}><Btn variant="dark" onClick={next} label={T("I'm ready →","Estoy lista →")}/></div>

  /* PRONOUNS */
  if(phase==="pronouns"){

  if(phase==="dob") return (

        <textarea style={{width:"100%",background:P.white,border:`1.5px solid ${P.borderP}`,borderRadius:18,padding:"16px 20px",fontSize:16,color:P.ink,fontFamily:PF,fontStyle:"italic",resize:"none",lineHeight:1.85,minHeight:140,boxShadow:"0 2px 16px rgba(245,220,130,0.10)",outline:"none",boxSizing:"border-box",marginBottom:16}} placeholder={T("I want to…","Quiero…")} value={vision} onChange={e=>setVision(e.target.value)}/>
        <p style={{fontSize:10,letterSpacing:"0.2em",color:P.muted,fontFamily:SF,textTransform:"uppercase",margin:"0 0 10px"}}>{T("OR START FROM","O EMPIEZA CON")}</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>

        </div>

      <div style={{padding:"16px 32px 52px"}}><Btn variant="dark" disabled={!vision.trim()} onClick={next} label={T("This is it →","Esto es →")}/></div>
    </ObFrame>
  );

  /* BELIEF */
  if(phase==="belief"){
    const opts=lang==="es"?BELIEF_ES:BELIEF_EN;
    return (
      <ObFrame pct={pct} onBack={back}>
        <div className="ob" style={{flex:1,padding:"72px 32px 24px"}}>
          <GLabel pink>{T("HONEST CHECK-IN","CHECK-IN HONESTO")}</GLabel>
          <p style={{fontSize:34,fontWeight:400,fontStyle:"italic",color:P.ink,lineHeight:1.35,margin:"0 0 28px",fontFamily:PF}}>{T("Where are you with it, right now?","¿Dónde estás con esto, ahora mismo?")}</p>
          {opts.map((o,i)=>(
            <button key={i} onClick={()=>setBelief(i)} style={{width:"100%",background:belief===i?P.ink:P.white,border:belief===i?"none":`1px solid ${P.border}`,borderRadius:18,padding:"16px 20px",display:"flex",alignItems:"center",gap:16,marginBottom:10,textAlign:"left",boxShadow:belief===i?"0 4px 16px rgba(30,18,8,0.14)":"0 1px 8px rgba(245,220,130,0.10)",transition:"all 0.15s"}}>
              <span style={{fontSize:22,fontFamily:PF,fontStyle:"italic",color:belief===i?P.butter:P.butterD,minWidth:26}}>{i+1}</span>

          ))}
        </div>
        <div style={{padding:"16px 32px 52px"}}><Btn variant="dark" disabled={belief===null} onClick={next} label={T("Continue →","Continuar →")}/></div>
      </ObFrame>
    );

  /* BLOCKS */
  if(phase==="blocks"){
    const opts=lang==="es"?BLOCKS_ES:BLOCKS_EN;
    return (
      <ObFrame pct={pct} onBack={back}>
        <div className="ob" style={{flex:1,padding:"72px 32px 24px"}}>
          <GLabel>{T("WHAT GETS IN THE WAY","LO QUE SE INTERPONE")}</GLabel>
          <p style={{fontSize:34,fontWeight:400,fontStyle:"italic",color:P.ink,lineHeight:1.35,margin:"0 0 8px",fontFamily:PF}}>{T("Which of these ring true?","¿Cuáles resuenan?")}</p>

          {opts.map((o,i)=>(
            <button key={i} onClick={()=>setBlocks(s=>{const n=new Set(s);n.has(i)?n.delete(i):n.add(i);return n;})} style={{width:"100%",background:P.white,border:`1.5px solid ${blocks.has(i)?P.butterD:P.border}`,borderRadius:16,padding:"14px 20px",display:"flex",alignItems:"center",gap:14,marginBottom:10,textAlign:"left",boxShadow:"0 1px 8px rgba(245,220,130,0.08)"}}>

        </div>
        <div style={{padding:"16px 32px 52px"}}><Btn variant="dark" onClick={next} label={T("Continue →","Continuar →")}/></div>
      </ObFrame>
    );
  }

  /* YOUR WORDS — dark screen */
  if(phase==="yourWords") return (
    <div style={{minHeight:"100vh",background:P.ink,display:"flex",flexDirection:"column",fontFamily:PF}}>
      <style>{G}</style>
      <ObBar pct={pct}/>
      <div className="ob" style={{flex:1,padding:"72px 32px 24px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
        <p style={{fontSize:44,fontWeight:400,fontStyle:"italic",color:P.butterL,lineHeight:1.2,margin:"0 0 6px"}}>Okay, {name}.</p>
        <p style={{fontSize:22,color:"rgba(251,240,178,0.65)",fontFamily:SF,fontWeight:300,margin:"0 0 32px"}}>{T("I heard you.","Te escuché.")}</p>
        <div style={{background:"rgba(255,255,255,0.06)",border:`1px solid rgba(245,220,130,0.25)`,borderRadius:22,padding:"22px 22px"}}>
          <p style={{fontSize:9,letterSpacing:"0.38em",color:P.butter,margin:"0 0 14px",fontFamily:SF,textTransform:"uppercase"}}>{T("YOUR WORDS","TUS PALABRAS")}</p>

        </div>
        <p style={{fontFamily:PF,fontStyle:"italic",fontSize:28,color:P.butter,margin:"28px 0 0"}}>{T("Let's make it real.","Hagámoslo real.")}</p>

      <div style={{padding:"16px 32px 52px"}}>
        <button onClick={next} style={{width:"100%",background:P.butter,border:"none",borderRadius:50,padding:"18px 24px",fontSize:15,fontWeight:500,color:P.ink,fontFamily:SF,boxShadow:`0 4px 20px rgba(245,220,130,0.40)`}}>{T("I'm ready →","Estoy lista →")}</button>
      </div>

  if(phase==="practiceTime") return (

/* ═══════════════════════════════════════════════════════════════
   VOICE ENGINE — ElevenLabs via Vercel proxy (one-time setup)
   Rachel voice · warm · audiobook quality · EN + ES
 */
const PROXY_URL = "https://celeste-voice-proxy.vercel.app";

function useCelesteVoice(lang) {
  const [playing,  setPlaying]  = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [progress, setProgress] = useState(0);
  const [paused,   setPaused]   = useState(false);
  const [error,    setError]    = useState("");
  const audioRef = useRef(null);
  const blobRef  = useRef(null);

  const cleanup = useCallback(() => {
    if (audioRef.current) {
      audioRef.current.pause();
      audioRef.current.onended = null;
      audioRef.current.ontimeupdate = null;
      audioRef.current = null;
    }
    if (blobRef.current) { URL.revokeObjectURL(blobRef.current); blobRef.current = null; }
  }, []);

  const stop   = useCallback(() => { cleanup(); setPlaying(false); setPaused(false); setLoading(false); setProgress(0); setError(""); }, [cleanup]);
  const pause  = useCallback(() => { audioRef.current?.pause();  setPlaying(false); setPaused(true);  }, []);
  const resume = useCallback(() => { audioRef.current?.play().catch(()=>{}); setPlaying(true); setPaused(false); }, []);

  const speak = useCallback(async (text) => {
    cleanup();
    setError(""); setLoading(true); setProgress(0); setPlaying(false); setPaused(false);
    try {
      const res = await fetch(PROXY_URL + "/api/tts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text.slice(0, 5000), lang }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setError(err?.error || "Error " + res.status);
        setLoading(false); return;
      }
      const blob = await res.blob();
      if (blob.size < 500) { setError("No audio received"); setLoading(false); return; }
      const url = URL.createObjectURL(blob);
      blobRef.current = url;
      const audio = new Audio(url);
      audioRef.current = audio;
      audio.ontimeupdate = () => { if (audio.duration) setProgress(audio.currentTime / audio.duration); };
      audio.onended  = () => { setPlaying(false); setProgress(1); cleanup(); };
      audio.onerror  = () => { setError("Playback error — tap ▶ to retry"); setPlaying(false); setLoading(false); };
      setLoading(false); setPlaying(true);
      await audio.play().catch(() => {
        setPlaying(false);
        setError(lang === "es" ? "Toca ▶ para iniciar." : "Tap ▶ to start.");
      });
    } catch {
      setError("Network error — check your connection");
      setLoading(false);
    }
  }, [lang, cleanup]);

  useEffect(() => () => cleanup(), [cleanup]);
  return { speak, pause, resume, stop, playing, paused, loading, progress, error };
}

function VoiceBar({ lang, text }) {
  const T = (en, es) => lang === "es" ? es : en;
  const { speak, pause, resume, stop, playing, paused, loading, progress, error } = useCelesteVoice(lang);
  const [mode, setMode] = useState("read");
  const pct = Math.round(progress * 100);

  const handlePlayPause = () => {
    if (loading) return;
    if (!playing && !paused) { speak(text); return; }
    if (paused) resume(); else pause();
  };

  return (
    <div style={{position:"sticky",bottom:0,background:"rgba(254,250,243,0.97)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:`1px solid ${P.border}`,padding:"12px 20px 22px",display:"flex",flexDirection:"column",gap:10}}>

              background:`linear-gradient(135deg,${P.butter},${P.pink})`,

              {loading
                ? <span style={{width:19,height:19,border:`2.5px solid rgba(44,26,16,0.18)`,borderTopColor:P.ink,borderRadius:"50%",animation:"spin 0.7s linear infinite",display:"inline-block"}}/>
                : <span style={{fontSize:20,lineHeight:1,color:P.ink}}>{playing?"⏸":"▶"}</span>}
            </button>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
              <div style={{height:4,background:"rgba(245,220,130,0.20)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:2,background:`linear-gradient(90deg,${P.butter},${P.pink})`,width:`${pct}%`,transition:"width 0.4s ease"}}/>
              </div>
              <p style={{fontSize:9,letterSpacing:"0.13em",color:P.muted,fontFamily:SF,margin:0,textTransform:"uppercase"}}>
                {loading  ? T("Generating Rachel's voice…","Generando voz de Rachel…")
                 : paused  ? T("Paused — tap ▶","En pausa — toca ▶")
                 : playing ? T("Rachel · " + pct + "%","Rachel · " + pct + "%")
                 :           T("Tap ▶ to begin","Toca ▶ para empezar")}
              </p>
            </div>
            <button onClick={()=>{stop();setMode("read");}} style={{width:36,height:36,borderRadius:"50%",border:`1.5px solid ${P.borderP}`,background:"rgba(255,255,255,0.80)",fontSize:13,cursor:"pointer",color:P.pinkD,display:"flex",alignItems:"center",justifyContent:"center"}}>■</button>
          </div>

          {!loading && !playing && !paused && !error && (
            <p style={{fontSize:10,color:P.muted,fontFamily:SF,textAlign:"center",lineHeight:1.55,margin:0}}>
              {T("Close your eyes. This is you, reading your own future.","Cierra los ojos. Eres tú, leyendo tu propio futuro.")}
            </p>
          )}
        </div>
      )}
    </div>
  );
}

  );
}

          <span style={{fontSize:10,letterSpacing:"0.2em",color:P.muted,fontFamily:SF}}>/10</span>

        <p style={{fontFamily:PF,fontStyle:"italic",fontSize:19,color:P.ink,margin:"0 0 10px"}}>{T("Alignment Score","Puntuación de Alineación")}</p>

      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:22}}>
        {[{n:cards.length,l:T("Stories","Historias")},{n:1,l:T("Days active","Días activa")},{n:`${total*10}%`,l:T("Aligned","Alineada")}].map((s,i)=>(

      {DIMS.map(d=>(
        <Card key={d.k} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <p style={{fontFamily:PF,fontStyle:"italic",fontSize:17,color:P.ink,margin:0}}>{d.l}</p>

          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            <span style={{fontSize:9,color:P.muted,fontFamily:SF}}>1</span>
            <span style={{fontSize:9,color:P.muted,fontFamily:SF}}>10</span>
          </div>

      ))}

      {/* What to expect */}
      <GLabel pink>{T("WHAT TO EXPECT","QUÉ ESPERAR")}</GLabel>
      {[[T("Day 1–7","Día 1–7"),T("Your voice feels unfamiliar. Do it anyway.","Tu voz se siente extraña. Hazlo de todas formas.")],[T("Day 14","Día 14"),T("The words start to feel like yours.","Las palabras empiezan a sentirse tuyas.")],[T("Day 30","Día 30"),T("The shifts others notice before you do.","Los cambios que otros notan antes que tú.")],[T("Day 90","Día 90"),T("You become the person who already has it.","Te conviertes en la persona que ya lo tiene.")]].map(([d,txt],i)=>(

      <div style={{marginTop:16,textAlign:"center"}}>

  );
}

/* ═══════════════════════════════════════════════════════════════
   VISION BOARD TAB — mood board for manifestation images */
function VisionBoard({lang}){
  const [images,setImages]=useState(()=>LS.get("celeste_vboard",[]));
  const [lightbox,setLightbox]=useState(null);
  const fileRef=useRef(null);
  const T=(en,es)=>lang==="es"?es:en;

  const save = imgs => { setImages(imgs); LS.set("celeste_vboard", imgs); };

  const onUpload=e=>{
    const files=Array.from(e.target.files||[]);
    files.forEach(f=>{
      const r=new FileReader();
      r.onload=()=>setImages(p=>{
        const updated=[...p,{src:r.result,id:Date.now()+Math.random(),label:""}];
        LS.set("celeste_vboard",updated);
        return updated;
      });
      r.readAsDataURL(f);
    });
    e.target.value="";
  };

  const removeImage=id=>save(images.filter(i=>i.id!==id));

  return (
    <div style={{background:P.ivory,minHeight:"100vh",padding:"56px 22px 110px"}}>
      <h2 style={{fontFamily:PF,fontWeight:400,fontStyle:"italic",fontSize:36,color:P.ink,margin:"0 0 6px"}}>{T("Vision Board","Tablero de Visión")}</h2>
      <p style={{fontSize:13,color:P.muted,fontFamily:SF,margin:"0 0 22px",lineHeight:1.6}}>{T("Build your manifestation mood board. Every image is a declaration.","Construye tu tablero de manifestación. Cada imagen es una declaración.")}</p>

      {/* Upload button */}
      <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={onUpload}/>
      <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{width:"100%",background:`linear-gradient(135deg,${P.butterL},${P.pinkL})`,border:`2px dashed ${P.borderP}`,borderRadius:22,padding:"28px 24px",marginBottom:20,display:"flex",flexDirection:"column",alignItems:"center",gap:10,cursor:"pointer",boxShadow:"none"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${P.butter},${P.pink})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:P.ink}}>+</div>
        <p style={{fontFamily:PF,fontStyle:"italic",fontSize:18,color:P.ink,margin:0}}>{T("Add images to your board","Agrega imágenes a tu tablero")}</p>
        <p style={{fontSize:12,color:P.muted,fontFamily:SF,margin:0}}>{T("Tap to upload from your camera roll","Toca para subir desde tu galería")}</p>
      </button>

      {/* Inspiration prompts */}
      {images.length===0&&(
        <div>
          <GLabel>{T("WHAT TO ADD","QUÉ AGREGAR")}</GLabel>
          {[
            {i:"🏡", en:"Your dream home — every room, every detail",              es:"Tu hogar soñado — cada cuarto, cada detalle"},
            {i:"💛", en:"The lifestyle you're calling in",                          es:"El estilo de vida que estás llamando"},
            {i:"🌹", en:"Love, family, the people in your future",                 es:"Amor, familia, las personas en tu futuro"},
            {i:"✦",  en:"Career milestones, brands you're building toward",        es:"Logros profesionales, marcas que construyes"},
            {i:"✈️", en:"Travel — the cities, the hotels, the views",              es:"Viajes — las ciudades, los hoteles, las vistas"},
            {i:"🌸", en:"How you want to feel — colors, textures, beauty",         es:"Cómo quieres sentirte — colores, texturas, belleza"},
          ].map((tip,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 0",borderBottom:`1px solid ${P.border}`}}>
              <span style={{fontSize:22,flexShrink:0}}>{tip.i}</span>
              <p style={{fontFamily:PF,fontStyle:"italic",fontSize:15,color:P.ink,margin:0,lineHeight:1.4}}>{lang==="es"?tip.es:tip.en}</p>
            </div>
          ))}
        </div>
      )}

      {/* Masonry grid */}
      {images.length>0&&(
        <>
          <GLabel pink>{T(`${images.length} IMAGE${images.length!==1?"S":""} · YOUR VISION`,`${images.length} IMAGEN${images.length!==1?"ES":""} · TU VISIÓN`)}</GLabel>
          <div style={{columns:2,columnGap:10}}>
            {images.map((img,i)=>(
              <div key={img.id} className="fu" style={{breakInside:"avoid",marginBottom:10,position:"relative",borderRadius:18,overflow:"hidden",boxShadow:`0 3px 16px rgba(245,220,130,0.18)`}}>
                <img src={img.src} onClick={()=>setLightbox(img)} style={{width:"100%",display:"block",borderRadius:18,cursor:"pointer"}} alt="vision"/>
                {/* Remove button */}
                <button onClick={()=>removeImage(img.id)} style={{position:"absolute",top:8,right:8,width:28,height:28,borderRadius:"50%",background:"rgba(30,18,8,0.65)",border:"none",color:"#fff",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>×</button>
                {/* Pink icing overlay strip */}
                <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(to top,rgba(240,184,192,0.70),transparent)",padding:"20px 10px 8px",borderBottomLeftRadius:18,borderBottomRightRadius:18}}>
                  <p style={{fontFamily:PF,fontStyle:"italic",fontSize:11,color:"#fff",margin:0,textShadow:"0 1px 4px rgba(30,18,8,0.4)"}}>{T("My vision","Mi visión")} ✦</p>
                </div>
              </div>
            ))}
          </div>
          {/* Add more */}
          <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{width:"100%",background:"rgba(255,255,255,0.72)",border:`1.5px dashed ${P.borderP}`,borderRadius:18,padding:"16px",marginTop:8,fontSize:14,color:P.pinkD,fontFamily:PF,fontStyle:"italic",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            + {T("Add more images","Agregar más imágenes")}
          </button>
        </>
      )}

      {/* Lightbox */}
      {lightbox&&(
        <div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"rgba(30,18,8,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
          <div style={{position:"relative",maxWidth:"100%",maxHeight:"100%"}}>
            <img src={lightbox.src} style={{maxWidth:"100%",maxHeight:"85vh",borderRadius:18,display:"block"}} alt="vision"/>
            <button onClick={()=>setLightbox(null)} style={{position:"absolute",top:-14,right:-14,width:36,height:36,borderRadius:"50%",background:P.butter,border:"none",fontSize:16,color:P.ink,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>×</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SPLASH SCREEN — Two-act cinematic intro
   Act 1: Cathedral hallway — slow walk toward the moon (7s)

 */
const HALL_IMG = "https://celeste-voice-proxy.vercel.app/img1.jpg";
const STAR_IMG = "https://celeste-voice-proxy.vercel.app/img2.jpg";

const SPLASH_CSS = `
@keyframes hallWalk{
  0%  {transform:scale(1.00) translateY(0px);   filter:brightness(0.50);}
  20% {transform:scale(1.06) translateY(-8px);  filter:brightness(0.58);}
  45% {transform:scale(1.16) translateY(-20px); filter:brightness(0.68);}
  70% {transform:scale(1.30) translateY(-36px); filter:brightness(0.82);}
  88% {transform:scale(1.48) translateY(-52px); filter:brightness(0.96);}
  100%{transform:scale(1.72) translateY(-72px); filter:brightness(1.15);opacity:0;}
}
@keyframes vigWalk{
  0%  {opacity:0.72;}40%{opacity:0.48;}80%{opacity:0.25;}100%{opacity:0.10;}
}
@keyframes starZoomIn{
  0%  {opacity:0;transform:scale(1.55);}
  40% {opacity:1;transform:scale(1.12);}

}

  100%{opacity:1;transform:translateY(0) scale(1);letter-spacing:0.06em;}
}
@keyframes sLineGrow{from{width:0;opacity:0;}to{width:108px;opacity:1;}}
@keyframes sSubIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

}
@keyframes sGlitter{

}));

              }}>Bilingual · Personal · Celestial</p>
              <p style={{
                fontFamily:PF,fontStyle:"italic",fontSize:16,
                color:"#2C1A10",letterSpacing:"0.07em",
                background:"rgba(253,246,204,0.50)",
                backdropFilter:"blur(4px)",WebkitBackdropFilter:"blur(4px)",
                borderRadius:50,padding:"4px 18px",margin:0,
              }}>Bilingüe · Personalizada · Celestial</p>
            </div>

          </div>
        )}

        {act>=1 && S_CORNERS.map((pos,i)=>(
          <div key={i} style={{
            position:"absolute",width:62,height:62,
            top:pos.top,left:pos.left,right:pos.right,bottom:pos.bottom,
            animation:`sCornerIn 1.2s ease ${0.9+i*0.12}s both`,
            pointerEvents:"none",
          }}>
            <svg width="62" height="62" viewBox="0 0 62 62" fill="none"
              style={{transform:`rotate(${pos.rot}deg)`,display:"block"}}>
              <path d="M4 4 L28 4 L4 28" stroke="rgba(245,220,130,0.78)" strokeWidth="1.4" fill="none"/>
              <path d="M4 4 L13 4 L4 13" stroke="rgba(240,184,192,0.88)" strokeWidth="2.2" fill="none"/>
              <path d="M4 4 L32 4" stroke="rgba(245,220,130,0.40)" strokeWidth="0.7" fill="none"/>
              <path d="M4 4 L4 32" stroke="rgba(245,220,130,0.40)" strokeWidth="0.7" fill="none"/>
              <circle cx="4" cy="4" r="3.2" fill="rgba(245,220,130,0.92)"/>
              <circle cx="28" cy="4" r="1.6" fill="rgba(240,184,192,0.78)"/>
              <circle cx="4" cy="28" r="1.6" fill="rgba(240,184,192,0.78)"/>
            </svg>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── localStorage helpers ────────────────────────────────────── */
const LS = {
  get: (key, fallback) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set: (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  },
  clear: () => {
    try { ["celeste_profile","celeste_cards","celeste_ready","celeste_tab","celeste_vboard","celeste_scores"].forEach(k=>localStorage.removeItem(k)); } catch {}
  },
};


/* ── Pre-saved profiles for both languages ── */
const PROFILE_EN = {
  lang:"en", name:"Lay",
  home:"A penthouse in Miami Beach, ocean view",
  love:"A devoted partner who adores me",
  career:"I run my own luxury brand, passive income flows",
  morning:"I wake up without an alarm, matcha, movement, golden light",
  feeling:"Deeply at peace, magnetic, loved",
  vision:"I manifest a penthouse in Miami Beach with ocean views, a devoted partner who adores me, my own luxury brand with passive income, waking up without an alarm to matcha and golden light, feeling deeply at peace, magnetic, and loved. Faith, travel, creative studio, close friendships.",
  extra:"Faith, travel, creative studio, close friendships",
  belief:4, blocks:[], practiceTime:"7:00 AM", pronouns:"she / her",
};

const PROFILE_ES = {
  lang:"es", name:"Lay",
  home:"Un penthouse en Miami Beach, vista al mar",
  love:"Una pareja devota que me adora",
  career:"Tengo mi propia marca de lujo, ingresos pasivos fluyen",
  morning:"Me despierto sin alarma, matcha, movimiento, luz dorada",
  feeling:"Profundamente en paz, magnética, amada",
  vision:"Manifestaría amor profundo, paz, un penthouse en Miami Beach con vista al mar, mi propia marca de lujo con ingresos pasivos, despertar sin alarma con matcha y luz dorada, sintiéndome en paz, magnética y amada. Fe, viajes, estudio creativo, amistades cercanas.",
  extra:"Fe, viajes, estudio creativo, amistades cercanas",
  belief:4, blocks:[], practiceTime:"7:00 AM", pronouns:"ella / ella",
};

/* Seed both profiles on first load */
(()=>{
  try {
    if (!localStorage.getItem("celeste_profile_en")) {
      localStorage.setItem("celeste_profile_en", JSON.stringify(PROFILE_EN));
    }
    if (!localStorage.getItem("celeste_profile_es")) {
      localStorage.setItem("celeste_profile_es", JSON.stringify(PROFILE_ES));
    }
  } catch {}
})();

const T_IDS  = ["home","stories","affirm","prayer","vision","progress"];
const T_ICONS = ["⌂","✦","♡","✝","🖼","◎"];
const T_EN   = ["Home","Stories","Affirm","Prayer","Vision","Progress"];
const T_ES   = ["Inicio","Historias","Afirmar","Oración","Visión","Progreso"];

function Celeste(){
  const [splash,   setSplash]   = useState(true);
  const [lang,     setLang]     = useState(() => LS.get("celeste_lang", null));
  const [ready,    setReady]    = useState(() => LS.get("celeste_ready", false));
  const [profile,  setProfile]  = useState(() => {
    const saved = LS.get("celeste_lang", null);
    if (saved) return LS.get(`celeste_profile_${saved}`, saved==="es" ? PROFILE_ES : PROFILE_EN);
    return {};
  });
  const [cards,    setCards]    = useState(() => {
    const l = LS.get("celeste_lang", null);
    return l ? LS.get(`celeste_cards_${l}`, []) : [];
  });
  const [tab,      setTab]      = useState(() => LS.get("celeste_tab", "home"));
  const [player,   setPlayer]   = useState(null);
  const [editMode, setEditMode] = useState(false);

  const onSplashDone = useCallback(() => setSplash(false), []);

  /* Persist profile + cards keyed by language */
  useEffect(() => {
    if (lang) {
      LS.set(`celeste_profile_${lang}`, profile);
      LS.set("celeste_lang", lang);
    }
  }, [profile, lang]);

  useEffect(() => {
    if (lang) LS.set(`celeste_cards_${lang}`, cards);
  }, [cards, lang]);

  useEffect(() => { LS.set("celeste_tab",   tab);   }, [tab]);
  useEffect(() => { LS.set("celeste_ready", ready); }, [ready]);

  const addCard = useCallback(c => setCards(p => {
    const updated = [c, ...p];
    if (lang) LS.set(`celeste_cards_${lang}`, updated);
    return updated;
  }), [lang]);

  /* User picks a language — load their saved profile for that language */
  const pickLang = useCallback((l) => {
    setLang(l);
    LS.set("celeste_lang", l);
    /* First check for a completed profile, then partial, then default */
    const saved = LS.get(`celeste_profile_${l}`, null);
    const partial = (() => { try { const p = localStorage.getItem(`celeste_partial_${l}`); return p ? JSON.parse(p) : null; } catch { return null; } })();
    const base = saved || partial || (l==="es" ? PROFILE_ES : PROFILE_EN);
    setProfile({...base, lang:l});
    const savedCards = LS.get(`celeste_cards_${l}`, []);
    setCards(savedCards);
    const isComplete = saved && saved.name && saved.vision;
    setReady(!!isComplete);
  }, []);

  const onComplete = useCallback(p => {
    const merged = {...p, lang};
    setProfile(merged);
    LS.set(`celeste_profile_${lang}`, merged);
    setReady(true);
    LS.set("celeste_ready", true);
    setEditMode(false);
  }, [lang]);

  /* ── Render logic ── */

  /* 1. Splash always plays first */
  if (splash) return <SplashScreen onDone={onSplashDone}/>;

  /* 2. Language picker — shown if no language chosen yet */
  if (!lang) return (
    <div style={{minHeight:"100vh",background:`linear-gradient(145deg,#FDF6CC,#FEFAF3,#FEF2F5,#FBF0B2,#FAE5E8)`,
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 36px"}}>
      <style>{G}</style>
      <div style={{textAlign:"center",marginBottom:48}}>
        <div style={{width:68,height:68,borderRadius:"50%",background:`linear-gradient(135deg,${P.butter},${P.pink})`,
          margin:"0 auto 18px",display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:26,boxShadow:`0 6px 24px rgba(245,220,130,0.42)`}}>✦</div>
        <h1 style={{fontSize:62,fontWeight:400,fontStyle:"italic",color:P.ink,margin:"0 0 8px",fontFamily:PF}}>Celeste</h1>
        <div style={{width:48,height:2,background:`linear-gradient(90deg,${P.butter},${P.pink})`,margin:"0 auto 14px",borderRadius:2}}/>
        <p style={{fontSize:13,color:P.muted,fontFamily:SF,letterSpacing:"0.08em"}}>Your manifestation companion</p>
      </div>
      <div style={{width:"100%",maxWidth:300,display:"flex",flexDirection:"column",gap:14}}>
        <button onClick={()=>pickLang("en")} style={{
          background:"rgba(255,255,255,0.85)",border:`2px solid ${P.butter}`,
          borderRadius:20,padding:"20px 24px",cursor:"pointer",
          boxShadow:`0 4px 20px rgba(245,220,130,0.22)`,
          display:"flex",alignItems:"center",gap:14,textAlign:"left",
        }}>
          <span style={{fontSize:28}}>🇺🇸</span>
          <div>
            <p style={{fontFamily:PF,fontStyle:"italic",fontSize:20,color:P.ink,margin:0}}>English</p>
            <p style={{fontSize:11,color:P.muted,fontFamily:SF,margin:0}}>Continue in English →</p>
          </div>
        </button>
        <button onClick={()=>pickLang("es")} style={{
          background:"rgba(255,255,255,0.85)",border:`2px solid ${P.pink}`,
          borderRadius:20,padding:"20px 24px",cursor:"pointer",
          boxShadow:`0 4px 20px rgba(240,184,192,0.22)`,
          display:"flex",alignItems:"center",gap:14,textAlign:"left",
        }}>
          <span style={{fontSize:28}}>🇲🇽</span>
          <div>
            <p style={{fontFamily:PF,fontStyle:"italic",fontSize:20,color:P.ink,margin:0}}>Español</p>
            <p style={{fontSize:11,color:P.muted,fontFamily:SF,margin:0}}>Continuar en Español →</p>
          </div>
        </button>
      </div>
      <p style={{fontSize:10,color:P.muted,fontFamily:SF,marginTop:28,letterSpacing:"0.1em",textAlign:"center"}}>
        You can change language anytime via ⚙ settings
      </p>
    </div>
  );

  /* 3. Onboarding — if profile not complete or editing */
  if (!ready || editMode) return (
    <OnboardingScreen
      onComplete={onComplete}
      onSkip={() => {
        setEditMode(false);
        if (!ready) {
          const p = lang==="es" ? PROFILE_ES : PROFILE_EN;
          setProfile({...p, lang});
          setReady(true);
        }
      }}
      existingProfile={editMode ? profile : (ready ? profile : null)}
    />
  );

  /* 4. Player */
  if (player) {
    const others = cards.filter(c => c.id !== player.id).slice(0,8);
    return <PlayerScreen lang={lang} card={player} others={others}
      onClose={()=>setPlayer(null)} onSwitch={c=>setPlayer(c)}/>;
  }

  /* 5. Main app */
  return (
    <div style={{maxWidth:480,margin:"0 auto",background:P.ivory,minHeight:"100vh",position:"relative"}}>
      <style>{G}</style>

      {/* Settings gear */}
      <button onClick={()=>setEditMode(true)} style={{position:"fixed",top:14,right:16,zIndex:50,
        background:"rgba(255,255,255,0.82)",border:`1.5px solid ${P.borderP}`,
        borderRadius:50,width:36,height:36,display:"flex",alignItems:"center",
        justifyContent:"center",fontSize:16,color:P.pinkD,
        boxShadow:"0 2px 10px rgba(240,184,192,0.20)"}}>⚙</button>

      {/* Language switcher pill */}
      <button onClick={()=>{ setLang(null); LS.set("celeste_lang",null); }} style={{
        position:"fixed",top:14,left:16,zIndex:50,
        background:"rgba(255,255,255,0.82)",border:`1.5px solid ${P.border}`,
        borderRadius:50,padding:"6px 14px",fontSize:11,color:P.butterD,
        fontFamily:SF,letterSpacing:"0.1em",cursor:"pointer",
        boxShadow:"0 2px 10px rgba(245,220,130,0.18)"}}>
        {lang==="es" ? "🇲🇽 ES" : "🇺🇸 EN"}
      </button>

      {tab==="home"      && <HomeTab      lang={lang} name={profile.name} profile={profile} cards={cards} onOpen={c=>setPlayer(c)} onGoStories={()=>setTab("stories")}/>}
      {tab==="stories"   && <StoriesTab   lang={lang} profile={profile} cards={cards} addCard={addCard} onOpen={c=>setPlayer(c)}/>}
      {tab==="affirm"    && <AffirmTab    lang={lang} profile={profile}/>}
      {tab==="prayer"    && <PrayerTab    lang={lang}/>}
      {tab==="vision"    && <VisionBoard  lang={lang}/>}
      {tab==="progress"  && <ProgressTab  lang={lang} profile={profile} cards={cards}/>}

      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
        width:"100%",maxWidth:480,background:"rgba(254,250,243,0.97)",
        backdropFilter:"blur(22px)",WebkitBackdropFilter:"blur(22px)",
        borderTop:`1px solid ${P.border}`,display:"flex",
        justifyContent:"space-around",padding:"9px 0 22px",zIndex:40}}>
        {T_IDS.map((id,i)=>(
          <button key={id} onClick={()=>setTab(id)} style={{background:"none",border:"none",
            display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 6px"}}>
            <span style={{fontSize:18,color:tab===id?P.pinkD:P.muted,transition:"color 0.2s"}}>{T_ICONS[i]}</span>
            <span style={{fontSize:8,letterSpacing:"0.08em",color:tab===id?P.pinkD:P.muted,
              fontFamily:SF,transition:"color 0.2s",textTransform:"uppercase"}}>
              {(lang==="es"?T_ES:T_EN)[i]}
            </span>
          </button>
        ))}
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(Celeste));
// Hide loading screen
if(window.__celesteReady) window.__celesteReady();
</script>
</body>
</html>
